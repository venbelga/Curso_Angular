<div fxLayout="row" fxLayoutAlign="center">
    <div fxLayout="column" fxFlex="900px">
        <form class="mt-60" #clientesFrm="ngForm" (ngSubmit)="salvar()">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>Cadastro de Clientes</mat-card-title>
                </mat-card-header>
                <mat-card-content class="mt-20">
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field class="full-width">
                                <mat-label>Nome:*</mat-label>
                                <input matInput name="nome" placeholder="Digite o nome do cliente"
                                    [(ngModel)]="cliente.nome">
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field class="full-width">
                                <mat-label>Email:*</mat-label>
                                <input matInput name="email" placeholder="Digite o email do cliente" type="email"
                                    [(ngModel)]="cliente.email">
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width">
                                <mat-label>CPF:*</mat-label>
                                <input matInput name="cpf" placeholder="Digite o CPF do cliente" [(ngModel)]="cliente.cpf">
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width">
                                <mat-label>Data de Nascimento:*</mat-label>
                                <input matInput name="dataNascimento" type="date" [(ngModel)]="cliente.dataNascimento">
                            </mat-form-field>
                        </div>
                    </div>
                </mat-card-content>
                <mat-card-actions class="mt-20">
                    <button mat-raised-button color="primary" type="submit"><mat-icon>save</mat-icon>
                        Salvar</button>
                    <button mat-raised-button color="primary" type="submit"><mat-icon>refresh</mat-icon>
                        Atualizar</button>
                    <button mat-raised-button color="accent" type="button" class="ml-5"><mat-icon>backspace</mat-icon>
                        Limpar</button>
                </mat-card-actions>
            </mat-card>
        </form>
    </div>
</div>
