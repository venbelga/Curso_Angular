<div class="container">
    <div class="form-box">
        <form #frm="ngForm" (ngSubmit)="calcularResultado()">
            <h2>Calculadora</h2>
            <label>Número 1:</label>
            <input type="number" id="numero1" name="numero1" [(ngModel)]="numero1" />
            <label>Número 2:</label>
            <input type="number" id="numero2" name="numero2" [(ngModel)]="numero2" />
            <button type="submit">Somar</button>
        </form>

        @if (resultado) {
        <div class="result-display">
            <p>Resultado: <span id="resultado">{{resultado}}</span></p>
        </div>
        }
    </div>
</div>
